<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-commerce Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <h1>E-commerce Admin</h1>
      </header>

      <section class="card">
        <h2>Products Catalog</h2>
        <div class="form">
          <div class="field">
            <label class="label">Product Id</label>
            <input id="productId" class="input" placeholder="1" />
          </div>
          <div class="field">
            <label class="label">Name</label>
            <input id="productName" class="input" placeholder="Item" />
          </div>
          <div class="field">
            <label class="label">Price</label>
            <input id="productPrice" class="input" type="number" step="0.01" placeholder="10" />
          </div>
          <div class="field">
            <label class="label">Quantity</label>
            <input id="productQty" class="input" type="number" step="1" placeholder="1" />
          </div>
        </div>
        <div class="row">
          <button id="createProduct" class="btn ghost">Create</button>
          <button id="updateProduct" class="btn ghost">Update</button>
          <button id="deleteProduct" class="btn ghost">Delete</button>
        </div>
        <div class="list-header">
          <span>Product Id</span>
          <span>Name</span>
          <span>Price</span>
          <span>Quantity</span>
          <span>Total Value</span>
          <span>Action</span>
        </div>
        <div id="products" class="list"></div>
      </section>

      <section class="card">
        <h2>Analytics</h2>
        <div class="row">
          <div class="field">
            <label class="label">Start</label>
            <input id="analyticsStart" class="input" type="date" />
          </div>
          <div class="field">
            <label class="label">End</label>
            <input id="analyticsEnd" class="input" type="date" />
          </div>
          <div class="field">
            <label class="label">Top Limit</label>
            <input id="analyticsLimit" class="input" type="number" value="10" />
          </div>
        </div>
        <div class="row">
          <button id="salesByDay" class="btn ghost">Products by Day</button>
          <button id="topProducts" class="btn ghost">Top Sales</button>
          <button id="revenueTrend" class="btn ghost">Sales Trend</button>
        </div>
        <canvas id="trendChart" class="chart" width="800" height="280"></canvas>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
